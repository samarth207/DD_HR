<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Portal — Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 460px;
        }

        .brand {
            text-align: center;
            margin-bottom: 32px;
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            margin-bottom: 14px;
            box-shadow: 0 8px 24px rgba(102,126,234,.4);
        }
        .brand h1 { color: #fff; font-size: 26px; font-weight: 700; }
        .brand p  { color: rgba(255,255,255,.55); font-size: 14px; margin-top: 4px; }

        .card {
            background: rgba(255,255,255,.07);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 20px;
            overflow: hidden;
        }

        /* Role tabs */
        .role-tabs {
            display: flex;
            border-bottom: 1px solid rgba(255,255,255,.1);
        }
        .role-tab {
            flex: 1;
            padding: 18px 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,.5);
            font-size: 14px;
            font-weight: 600;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .role-tab.active {
            color: #fff;
            background: rgba(102,126,234,.18);
            border-bottom: 2px solid #667eea;
        }
        .role-tab:hover:not(.active) { color: rgba(255,255,255,.75); background: rgba(255,255,255,.04); }

        /* Form */
        .form-panel { display: none; padding: 32px; }
        .form-panel.active { display: block; }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: rgba(255,255,255,.7);
            margin-bottom: 8px;
        }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255,255,255,.35);
            font-size: 14px;
            pointer-events: none;
        }
        .input-wrap input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.14);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        .input-wrap input::placeholder { color: rgba(255,255,255,.3); }
        .input-wrap input:focus {
            border-color: #667eea;
            background: rgba(102,126,234,.12);
        }
        .input-wrap .eye-btn {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255,255,255,.35);
            font-size: 14px;
            pointer-events: all;
        }
        .input-wrap .eye-btn:hover { color: rgba(255,255,255,.7); }

        .error-msg {
            background: rgba(245,87,108,.15);
            border: 1px solid rgba(245,87,108,.3);
            color: #fca5a5;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }
        .error-msg.show { display: flex; align-items: center; gap: 8px; }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity .2s, transform .1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-login:hover { opacity: .92; }
        .btn-login:active { transform: scale(.99); }
        .btn-login:disabled { opacity: .6; cursor: not-allowed; }

        .hint {
            margin-top: 16px;
            text-align: center;
            font-size: 12px;
            color: rgba(255,255,255,.35);
        }
        .hint strong { color: rgba(255,255,255,.55); }

        @media (max-width: 480px) {
            .form-panel { padding: 24px 20px; }
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="brand">
        <div class="brand-icon"><i class="fas fa-users-cog"></i></div>
        <h1>HR Portal</h1>
        <p>Sign in to continue</p>
    </div>

    <div class="card">
        <!-- Role selector -->
        <div class="role-tabs">
            <button class="role-tab active" id="tabAdmin" onclick="switchRole('admin')">
                <i class="fas fa-shield-alt"></i> Admin
            </button>
            <button class="role-tab" id="tabEmployee" onclick="switchRole('employee')">
                <i class="fas fa-user"></i> Employee
            </button>
        </div>

        <!-- Admin login -->
        <div class="form-panel active" id="adminPanel">
            <div class="error-msg" id="adminError"><i class="fas fa-exclamation-circle"></i><span></span></div>
            <div class="form-group">
                <label>Admin Password</label>
                <div class="input-wrap">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPassword" placeholder="Enter admin password"
                        autocomplete="current-password" onkeydown="if(event.key==='Enter')doAdminLogin()">
                    <button class="eye-btn" onclick="togglePwd('adminPassword',this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button class="btn-login" id="adminLoginBtn" onclick="doAdminLogin()">
                <i class="fas fa-sign-in-alt"></i> Sign In as Admin
            </button>
            <p class="hint">Admin access to all HR features</p>
        </div>

        <!-- Employee login -->
        <div class="form-panel" id="employeePanel">
            <div class="error-msg" id="employeeError"><i class="fas fa-exclamation-circle"></i><span></span></div>
            <div class="form-group">
                <label>Personal Email</label>
                <div class="input-wrap">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="empEmail" placeholder="your@email.com"
                        autocomplete="email" onkeydown="if(event.key==='Enter')document.getElementById('empPhone').focus()">
                </div>
            </div>
            <div class="form-group">
                <label>Phone Number <span style="color:rgba(255,255,255,.35);font-weight:400;">(as registered)</span></label>
                <div class="input-wrap">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="empPhone" placeholder="Your registered phone number"
                        autocomplete="tel" onkeydown="if(event.key==='Enter')doEmployeeLogin()">
                    <button class="eye-btn" onclick="togglePwd('empPhone',this)" tabindex="-1">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>
            <button class="btn-login" id="empLoginBtn" onclick="doEmployeeLogin()">
                <i class="fas fa-sign-in-alt"></i> Sign In as Employee
            </button>
            <p class="hint">Use your <strong>registered email</strong> and <strong>phone number</strong></p>
        </div>
    </div>
</div>

<script src="config.js"></script>
<script>
    // If already authenticated, redirect accordingly
    (function() {
        const raw = localStorage.getItem('hrPortalAuth');
        if (!raw) return;
        try {
            const auth = JSON.parse(raw);
            if (auth && auth.token) {
                if (auth.role === 'admin') { window.location.replace('index.html'); }
                else { window.location.replace('employee-portal.html'); }
            }
        } catch(_) {}
    })();

    function switchRole(role) {
        document.getElementById('tabAdmin').classList.toggle('active', role === 'admin');
        document.getElementById('tabEmployee').classList.toggle('active', role === 'employee');
        document.getElementById('adminPanel').classList.toggle('active', role === 'admin');
        document.getElementById('employeePanel').classList.toggle('active', role === 'employee');
    }

    function togglePwd(inputId, btn) {
        const inp = document.getElementById(inputId);
        const icon = btn.querySelector('i');
        if (inp.type === 'password') { inp.type = 'text'; icon.className = 'fas fa-eye-slash'; }
        else { inp.type = 'password'; icon.className = 'fas fa-eye'; }
    }

    function showError(panelId, msg) {
        const el = document.getElementById(panelId);
        el.querySelector('span').textContent = msg;
        el.classList.add('show');
    }
    function clearError(panelId) { document.getElementById(panelId).classList.remove('show'); }

    async function doAdminLogin() {
        const password = document.getElementById('adminPassword').value.trim();
        clearError('adminError');
        if (!password) { showError('adminError', 'Please enter your password.'); return; }

        const btn = document.getElementById('adminLoginBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

        try {
            const resp = await fetch(`${API_BASE_URL}/auth/admin-login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password })
            });
            const data = await resp.json();
            if (!resp.ok) { showError('adminError', data.error || 'Login failed'); return; }

            localStorage.setItem('hrPortalAuth', JSON.stringify({ token: data.token, role: 'admin' }));
            window.location.replace('index.html');
        } catch(e) {
            showError('adminError', 'Server unreachable. Is the server running?');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In as Admin';
        }
    }

    async function doEmployeeLogin() {
        const email = document.getElementById('empEmail').value.trim();
        const phone = document.getElementById('empPhone').value.trim();
        clearError('employeeError');
        if (!email || !phone) { showError('employeeError', 'Email and phone number are required.'); return; }

        const btn = document.getElementById('empLoginBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';

        try {
            const resp = await fetch(`${API_BASE_URL}/auth/employee-login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, phone })
            });
            const data = await resp.json();
            if (!resp.ok) { showError('employeeError', data.error || 'Login failed'); return; }

            localStorage.setItem('hrPortalAuth', JSON.stringify({
                token: data.token,
                role: 'employee',
                employeeId: data.employeeId,
                name: data.name,
                department: data.department,
                position: data.position
            }));
            window.location.replace('employee-portal.html');
        } catch(e) {
            showError('employeeError', 'Server unreachable. Is the server running?');
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In as Employee';
        }
    }
</script>
</body>
</html>
